---
layout: default
title: Stock
permalink: /stock/
---

<div class="stock-header">
  <div>
    <h1 class="lang-ko">주가</h1>
    <h1 class="lang-en">Stock</h1>
  </div>
  <button class="fullscreen-btn" onclick="toggleFullscreen()" title="Fullscreen">
    <span id="fs-icon">&#x26F6;</span>
  </button>
</div>

<div class="stock-widget" id="stock-widget">
  <!-- TradingView Widget BEGIN -->
  <div class="tradingview-widget-container">
    <div id="tradingview_baba"></div>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <script type="text/javascript">
    new TradingView.widget({
      "autosize": true,
      "symbol": "NYSE:BABA",
      "interval": "D",
      "timezone": "Asia/Seoul",
      "theme": localStorage.getItem('theme') === 'dark' ? 'dark' : 'light',
      "style": "1",
      "locale": "en",
      "toolbar_bg": "#f1f3f6",
      "enable_publishing": false,
      "allow_symbol_change": true,
      "container_id": "tradingview_baba"
    });
    </script>
  </div>
  <!-- TradingView Widget END -->
</div>

<script>
function toggleFullscreen() {
  var widget = document.getElementById('stock-widget');
  widget.classList.toggle('stock-fullscreen');
  var icon = document.getElementById('fs-icon');
  icon.innerHTML = widget.classList.contains('stock-fullscreen') ? '&#x2716;' : '&#x26F6;';
  document.body.style.overflow = widget.classList.contains('stock-fullscreen') ? 'hidden' : '';
}
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    var widget = document.getElementById('stock-widget');
    if (widget && widget.classList.contains('stock-fullscreen')) {
      toggleFullscreen();
    }
  }
});
</script>
