---
layout: default
title: Search
permalink: /search/
---

<h1>Search</h1>

<input type="text" class="search-input" id="search-input" placeholder="검색어를 입력하세요..." autofocus>

<ul class="search-results" id="search-results"></ul>

<script>
(function() {
  var posts = [
    {% for post in site.posts %}
    {
      title: {{ post.title | jsonify }},
      url: {{ post.url | relative_url | jsonify }},
      date: {{ post.date | date: "%Y-%m-%d" | jsonify }},
      categories: {{ post.categories | jsonify }},
      tags: {{ post.tags | jsonify }},
      content: {{ post.content | strip_html | truncatewords: 80 | jsonify }}
    }{% unless forloop.last %},{% endunless %}
    {% endfor %}
  ];

  var input = document.getElementById('search-input');
  var results = document.getElementById('search-results');

  input.addEventListener('input', function() {
    var query = this.value.toLowerCase().trim();
    results.innerHTML = '';

    if (query.length < 2) return;

    var matches = posts.filter(function(post) {
      return post.title.toLowerCase().includes(query) ||
             post.content.toLowerCase().includes(query) ||
             post.tags.join(' ').toLowerCase().includes(query) ||
             post.categories.join(' ').toLowerCase().includes(query);
    });

    if (matches.length === 0) {
      results.innerHTML = '<li style="color:var(--text-muted);padding:1rem 0;">검색 결과가 없습니다.</li>';
      return;
    }

    matches.forEach(function(post) {
      var li = document.createElement('li');
      li.className = 'post-item';
      li.innerHTML = '<div class="post-meta">' + post.date + '</div>' +
                     '<h2><a href="' + post.url + '">' + post.title + '</a></h2>' +
                     '<p class="post-excerpt">' + post.content + '</p>';
      results.appendChild(li);
    });
  });
})();
</script>
