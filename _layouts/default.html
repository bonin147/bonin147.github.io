<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
  <meta name="description" content="{{ page.description | default: site.description }}">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ '/assets/css/style.css' | relative_url }}">
  <link rel="alternate" type="application/rss+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
  <script>
    if (localStorage.getItem('theme') === 'dark') document.documentElement.classList.add('dark');
  </script>
  {% seo %}
</head>
<body>
  <div class="layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-inner">
        <div class="sidebar-header">
          <a href="{{ '/' | relative_url }}" class="sidebar-name">{{ site.author.name }}</a>
          <p class="sidebar-desc">{{ site.description }}</p>
        </div>

        <nav class="sidebar-nav">
          <div class="sidebar-section-title">Pages</div>
          <ul class="sidebar-pages">
            <li><a href="{{ '/' | relative_url }}" {% if page.url == '/' %}class="active"{% endif %}>Posts</a></li>
            <li><a href="{{ '/about/' | relative_url }}" {% if page.url == '/about/' %}class="active"{% endif %}>About / CV</a></li>
            <li><a href="{{ '/publications/' | relative_url }}" {% if page.url == '/publications/' %}class="active"{% endif %}>Publications</a></li>
            <li><a href="{{ '/projects/' | relative_url }}" {% if page.url == '/projects/' %}class="active"{% endif %}>Projects</a></li>
            <li><a href="{{ '/search/' | relative_url }}" {% if page.url == '/search/' %}class="active"{% endif %}>Search</a></li>
          </ul>

        </nav>

        <div class="sidebar-footer">
          <div class="sidebar-links">
            {% if site.social.github %}<a href="https://github.com/{{ site.social.github }}" target="_blank">GitHub</a>{% endif %}
            {% if site.social.scholar %}<a href="{{ site.social.scholar }}" target="_blank">Scholar</a>{% endif %}
            <a href="{{ '/feed.xml' | relative_url }}">RSS</a>
          </div>
          <label class="dark-toggle">
            <input type="checkbox" id="dark-check" onchange="toggleTheme()">
            <span class="dark-slider"></span>
            <span class="dark-label">Dark mode</span>
          </label>
        </div>
      </div>
    </aside>

    <!-- Mobile Header -->
    <header class="mobile-header">
      <a href="{{ '/' | relative_url }}" class="sidebar-name">{{ site.author.name }}</a>
      <button class="mobile-menu-btn" onclick="document.querySelector('.sidebar').classList.toggle('open')" aria-label="Menu">☰</button>
    </header>

    <!-- Main Content -->
    <main class="main-content">
      {{ content }}
    </main>
  </div>

  <script>
    function toggleTheme() {
      var isDark = document.getElementById('dark-check').checked;
      document.documentElement.classList.toggle('dark', isDark);
      document.body.classList.toggle('dark-mode', isDark);
      localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    (function() {
      if (localStorage.getItem('theme') === 'dark') {
        document.body.classList.add('dark-mode');
        var cb = document.getElementById('dark-check');
        if (cb) cb.checked = true;
      }
    })();
  </script>
</body>
</html>
